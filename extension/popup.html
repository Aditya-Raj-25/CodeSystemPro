<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodeTrackr Sync Pro</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #1e1e1e;
      color: #cccccc;
      width: 320px;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333333;
    }
    .logo {
      width: 24px;
      height: 24px;
      background-color: #569cd6;
      color: white;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
    }
    .title {
      font-size: 16px;
      font-weight: bold;
      color: #569cd6;
    }
    .status-box {
      background-color: #252526;
      border: 1px solid #333333;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .status-text {
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #10B981; /* green */
      display: inline-block;
    }
    .indicator.offline {
      background-color: #EF4444; /* red */
    }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background-color: #569cd6;
      color: white;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn:hover {
      background-color: #4a8cc7;
    }
    .btn.secondary {
      background-color: #333333;
    }
    .btn.secondary:hover {
      background-color: #4d4d4d;
    }
    .footer {
      font-size: 11px;
      text-align: center;
      color: #6B7280;
    }
    #login-section {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">&lt;/&gt;</div>
    <div class="title">CodeTrackr Sync</div>
  </div>

  <div id="main-section">
    <div class="status-box">
      <div class="status-text">
        <span>Status</span>
        <span><span id="status-dot" class="indicator"></span> <span id="status-label">Active</span></span>
      </div>
      <div style="font-size: 12px; color: #9CA3AF;">Listening for AC submissions on LeetCode & Codeforces.</div>
    </div>
    <button class="btn" id="manual-sync-btn">Trigger Manual Sync</button>
    <button class="btn secondary" id="dashboard-btn">Open Dashboard</button>
  </div>

  <div id="login-section">
    <p style="font-size: 13px; margin-bottom: 12px;">Please log in to your dashboard to enable syncing.</p>
    <button class="btn" id="login-btn">Go to Login</button>
  </div>

  <div class="footer">v1.0.0 • Background Sync Running</div>
  
  <script src="popup.js"></script>
</body>
</html>
