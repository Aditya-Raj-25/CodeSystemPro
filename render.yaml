services:
  - type: web
    name: party-server
    runtime: docker
    dockerContext: server
    dockerfilePath: Dockerfile
    plan: free
    region: oregon # or your preferred region
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User needs to provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

  - type: web
    name: party-client
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishDir: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: party-server
          property: host
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
